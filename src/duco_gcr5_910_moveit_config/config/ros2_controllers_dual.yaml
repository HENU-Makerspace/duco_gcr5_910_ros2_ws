# Gazebo-side controllers for the real + digital twin launch.
# MoveIt talks to arm_1_controller, which is provided by DualTrajectoryAction.
# Gazebo exposes sim_arm_1_controller to avoid action-name conflicts.

controller_manager:
  ros__parameters:
    update_rate: 100

    sim_arm_1_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

sim_arm_1_controller:
  ros__parameters:
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
